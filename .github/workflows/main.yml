name: scientific-python-lectures-auto-update
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  script:
    environment: deploy
    permissions:
      pull-requests: write
      issues: write
      repository-projects: write
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Get Job URL
        uses: Tiryoh/gha-jobid-action@be260d8673c9211a84cdcf37794ebd654ba81eef
        id: jobs
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          job_name: script
      - name: checkout with submodule
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
          submodules: true
      - name: Setup SSH
        if: contains(github.ref, 'main')
        uses: MrSquaare/ssh-setup-action@84a60849dca0e42e04b9b73f930036654e4672ab
        with:
          host: github.com
          private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9
        with:
          packages: libopenblas-dev
          version: 1.0
      - name: update submodule
        run: |
          (cd scientific-python-lectures; git fetch origin; git checkout main; git reset --hard origin/main; git branch -a)
      - uses: py-actions/py-dependency-install@30aa0023464ed4b5b116bd9fbdab87acf01a484e
        with:
          path: requirements.txt
      - name: update
        run: |
          sh ./locales/update.sh
      - name: git_config
        run: |
          git config --global user.email "transifex-integration[bot]@users.noreply.github.com"
          git config --global user.name "transifex-integration[bot]"
      - name: commit
        if: contains(github.event.head_commit.message, '[ci skip]') == false && contains(github.ref, 'main')
        env:
          JOB_ID: ${{ steps.jobs.outputs.job_id }}
          HTML_URL: ${{ steps.jobs.outputs.html_url }}
        run: |
          git add .
          git commit --allow-empty -m "[ci skip] $JOB_ID
          $HTML_URL"
          git remote -v
          git remote add github git@github.com:$GITHUB_REPOSITORY.git
          git push github main
